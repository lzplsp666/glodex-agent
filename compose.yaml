name: glodex-agent

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: glodex-agent-app:py3.12.3
    container_name: glodex-app
    restart: unless-stopped
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: glodex_agent
      MYSQL_USER: glodex
      MYSQL_PASSWORD: glodex_password
      REDIS_URL: redis://redis:6379/0
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: glodex
      MINIO_SECRET_KEY: glodex_minio_password
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy

  mysql:
    image: mysql:8.4.10
    container_name: glodex-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: glodex_root_password
      MYSQL_DATABASE: glodex_agent
      MYSQL_USER: glodex
      MYSQL_PASSWORD: glodex_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - glodex_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pglodex_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.14
    container_name: glodex-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - glodex_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: glodex-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: glodex
      MINIO_ROOT_PASSWORD: glodex_minio_password
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - glodex_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: glodex-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command:
      - etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - glodex_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  milvus:
    image: milvusdb/milvus:v2.5.27
    container_name: glodex-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: glodex
      MINIO_SECRET_ACCESS_KEY: glodex_minio_password
      TZ: Asia/Shanghai
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - glodex_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  glodex_mysql_data:
  glodex_redis_data:
  glodex_minio_data:
  glodex_etcd_data:
  glodex_milvus_data:
